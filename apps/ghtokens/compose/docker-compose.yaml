services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,secretsmanager
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - localstack_data:/var/lib/localstack

  localstack-init:
    image: amazon/aws-cli
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo 'Waiting for LocalStack to be ready...'
        until aws --endpoint-url http://localstack:4566 --region us-east-1 dynamodb list-tables 2>/dev/null; do sleep 2; done
        
        echo 'Creating DynamoDB table...'
        aws --endpoint-url http://localstack:4566 dynamodb create-table \
          --table-name ghtokens-table \
          --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --region us-east-1 || echo 'Table already exists'
          
        echo 'Creating SecretsManager secret...'
        aws --endpoint-url http://localstack:4566 secretsmanager create-secret \
          --name /ghtokens/apps/test-app-id \
          --secret-string '{"app_id":"test-app-id","private_key":"test-key","installation_id":"test-install-id"}' \
          --region us-east-1 || echo 'Secret already exists'
          
        echo 'LocalStack initialization complete!'

  ghtokens:
    image: oven/bun:latest
    working_dir: /app/apps/ghtokens
    volumes:
      # Mount the repository root to access workspace dependencies
      - ../../..:/app
    ports:
      - "8080:8080"
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - TABLE_NAME=ghtokens-table
      - DEFAULT_GITHUB_APP_ID=test-app-id
      - NODE_ENV=development
      # Tell Connect RPC to accept unencrypted HTTP requests locally
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    command: bun run --hot src/index.ts
    depends_on:
      localstack-init:
        condition: service_completed_successfully

volumes:
  localstack_data:
